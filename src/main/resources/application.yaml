server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
      
        - id: login-auth
          uri: http://localhost:8082
          predicates:
            - Path=/v1/auth/**

        - id: login-user
          uri: http://localhost:8082
          predicates:
            - Path=/salvar/**

        - id: cliente-service
          uri: http://localhost:8083
          predicates:
            - Path=/clientes/**

        - id: produto-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/produtos/**

        - id: venda-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/vendas/**
